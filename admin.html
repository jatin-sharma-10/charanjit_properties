<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Charanjit Properties</title>
  <meta name="robots" content="noindex, nofollow">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --bg: #0f1117;
      --card: #1a1d27;
      --border: #2a2d37;
      --accent: #c8a45e;
      --accent-light: #e8c87e;
      --green: #22c55e;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --red: #ef4444;
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .admin-header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .admin-logo { display: flex; align-items: center; gap: 12px; }
    .admin-logo h1 { font-size: 18px; font-weight: 600; }
    .admin-logo span { color: var(--accent); font-size: 13px; font-weight: 500; }
    .admin-actions { display: flex; gap: 10px; }
    .btn-admin {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }
    .btn-admin:hover { background: var(--border); }
    .btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
    .btn-accent:hover { background: var(--accent-light); }

    .admin-body { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .stat-card-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .stat-card-value { font-size: 32px; font-weight: 700; }
    .stat-card-value.gold { color: var(--accent); }
    .stat-card-value.green { color: var(--green); }
    .stat-card-value.blue { color: var(--blue); }
    .stat-card-value.orange { color: var(--orange); }

    .controls-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-tabs { display: flex; gap: 4px; background: var(--card); border-radius: 10px; padding: 4px; border: 1px solid var(--border); }
    .filter-tab {
      padding: 8px 16px;
      border: none;
      background: transparent;
      color: var(--text-dim);
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      transition: 0.2s;
    }
    .filter-tab.active { background: var(--accent); color: #000; font-weight: 600; }
    .filter-tab:hover:not(.active) { color: var(--text); }
    .filter-tab .count { font-size: 11px; margin-left: 4px; opacity: 0.7; }
    .search-box {
      position: relative;
    }
    .search-box i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 14px; }
    .search-box input {
      padding: 10px 14px 10px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 13px;
      width: 260px;
      outline: none;
    }
    .search-box input:focus { border-color: var(--accent); }

    .leads-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 14px 16px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    td {
      padding: 14px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-buy { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-sell { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-new { background: rgba(200,164,94,0.15); color: var(--accent); }
    .badge-contacted { background: rgba(59,130,246,0.15); color: var(--blue); }
    .badge-in-progress { background: rgba(245,158,11,0.15); color: var(--orange); }
    .badge-converted { background: rgba(34,197,94,0.15); color: var(--green); }
    .badge-closed { background: rgba(156,163,175,0.15); color: var(--text-dim); }

    .lead-name { font-weight: 600; display: block; }
    .lead-contact { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .lead-contact a { color: var(--accent); }
    .lead-detail { font-size: 12px; color: var(--text-dim); }
    .lead-date { font-size: 12px; color: var(--text-dim); }

    .action-btns { display: flex; gap: 6px; }
    .action-btn {
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: 0.2s;
    }
    .action-btn:hover { background: var(--border); color: var(--text); }
    .action-btn.danger:hover { background: rgba(239,68,68,0.15); color: var(--red); border-color: var(--red); }

    select.status-select {
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
      outline: none;
    }

    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-dim);
    }
    .page-btns { display: flex; gap: 4px; }
    .page-btn {
      padding: 6px 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .page-btn:hover { background: var(--border); }
    .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-dim); }
    .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.3; }
    .empty-state p { font-size: 15px; }

    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px; width: 90%; max-width: 480px;
    }
    .modal h3 { font-size: 18px; margin-bottom: 16px; }
    .modal textarea {
      width: 100%; padding: 10px; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; resize: vertical; min-height: 100px;
      font-family: inherit; outline: none;
    }
    .modal textarea:focus { border-color: var(--accent); }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }

    .loading { text-align: center; padding: 40px; color: var(--text-dim); }

    @media (max-width: 1024px) {
      .stats-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .admin-header { padding: 12px 16px; }
      .admin-body { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .controls-bar { flex-direction: column; align-items: stretch; }
      .search-box input { width: 100%; }
      .leads-table-wrap { overflow-x: auto; }
      table { min-width: 700px; }
    }
  </style>
</head>
<body>

  <div class="admin-header">
    <div class="admin-logo">
      <div>
        <h1>Charanjit Properties</h1>
        <span>Lead Management Dashboard</span>
      </div>
    </div>
    <div class="admin-actions">
      <button class="btn-admin" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
      <button class="btn-admin" onclick="loadLeads()"><i class="fas fa-sync-alt"></i> Refresh</button>
      <a href="/" class="btn-admin btn-accent"><i class="fas fa-globe"></i> View Website</a>
    </div>
  </div>

  <div class="admin-body">
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-card-label">Total Enquiries</div><div class="stat-card-value gold" id="statTotal">-</div></div>
      <div class="stat-card"><div class="stat-card-label">New Leads</div><div class="stat-card-value orange" id="statNew">-</div></div>
      <div class="stat-card"><div class="stat-card-label">Contacted</div><div class="stat-card-value blue" id="statContacted">-</div></div>
      <div class="stat-card"><div class="stat-card-label">Converted</div><div class="stat-card-value green" id="statConverted">-</div></div>
      <div class="stat-card"><div class="stat-card-label">Buyers / Sellers</div><div class="stat-card-value" id="statRatio" style="font-size:20px;">-</div></div>
    </div>

    <div class="controls-bar">
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab active" data-status="all">All</button>
        <button class="filter-tab" data-status="new">New</button>
        <button class="filter-tab" data-status="contacted">Contacted</button>
        <button class="filter-tab" data-status="in-progress">In Progress</button>
        <button class="filter-tab" data-status="converted">Converted</button>
        <button class="filter-tab" data-status="closed">Closed</button>
      </div>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Search by name, phone or email...">
      </div>
    </div>

    <div class="leads-table-wrap">
      <table>
        <thead>
          <tr>
            <th>Lead</th>
            <th>Intent</th>
            <th>Property</th>
            <th>Area</th>
            <th>Budget</th>
            <th>Status</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="leadsBody">
          <tr><td colspan="8" class="loading"><i class="fas fa-spinner fa-spin"></i> Loading...</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination" style="display:none;">
        <span id="pageInfo"></span>
        <div class="page-btns" id="pageBtns"></div>
      </div>
    </div>
  </div>

  <!-- Notes Modal -->
  <div class="modal-overlay" id="notesModal">
    <div class="modal">
      <h3>Lead Notes</h3>
      <textarea id="notesText" placeholder="Add notes about this lead..."></textarea>
      <div class="modal-actions">
        <button class="btn-admin" onclick="closeNotesModal()">Cancel</button>
        <button class="btn-admin btn-accent" onclick="saveNotes()">Save Notes</button>
      </div>
    </div>
  </div>

  <script>
    let currentStatus = 'all';
    let currentPage = 1;
    let currentSearch = '';
    let editingLeadId = null;

    function getAuthHeader() {
      const creds = sessionStorage.getItem('adminAuth');
      if (creds) return 'Basic ' + creds;

      const username = prompt('Admin Username:');
      if (!username) return null;
      const password = prompt('Admin Password:');
      if (!password) return null;

      const encoded = btoa(username + ':' + password);
      sessionStorage.setItem('adminAuth', encoded);
      return 'Basic ' + encoded;
    }

    async function apiCall(url, options = {}) {
      const auth = getAuthHeader();
      if (!auth) { window.location.href = '/'; return null; }
      options.headers = { ...options.headers, 'Authorization': auth, 'Content-Type': 'application/json' };
      const res = await fetch(url, options);
      if (res.status === 401) {
        sessionStorage.removeItem('adminAuth');
        alert('Invalid credentials. Please try again.');
        location.reload();
        return null;
      }
      return res.json();
    }

    async function loadLeads() {
      const params = new URLSearchParams({ status: currentStatus, page: currentPage, search: currentSearch });
      const data = await apiCall('/api/admin/leads?' + params);
      if (!data) return;

      document.getElementById('statTotal').textContent = data.stats.total;
      document.getElementById('statNew').textContent = data.stats.new_count;
      document.getElementById('statContacted').textContent = data.stats.contacted_count;
      document.getElementById('statConverted').textContent = data.stats.converted_count;
      document.getElementById('statRatio').textContent = `${data.stats.buyers} / ${data.stats.sellers}`;

      const tbody = document.getElementById('leadsBody');
      if (data.leads.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state"><i class="fas fa-inbox"></i><p>No leads found</p></div></td></tr>';
        document.getElementById('pagination').style.display = 'none';
        return;
      }

      tbody.innerHTML = data.leads.map(l => `
        <tr>
          <td>
            <span class="lead-name">${esc(l.name)}</span>
            <span class="lead-contact"><a href="tel:${l.phone}">${esc(l.phone)}</a></span>
            ${l.email ? `<span class="lead-contact">${esc(l.email)}</span>` : ''}
          </td>
          <td><span class="badge badge-${l.intent}">${l.intent.toUpperCase()}</span></td>
          <td><span class="lead-detail">${esc(l.property_type || '-')}</span></td>
          <td><span class="lead-detail">${esc(l.area || '-')}</span></td>
          <td><span class="lead-detail">${esc(l.budget || '-')}</span></td>
          <td>
            <select class="status-select" onchange="updateStatus(${l.id}, this.value)">
              ${['new','contacted','in-progress','converted','closed'].map(s =>
                `<option value="${s}" ${l.status === s ? 'selected' : ''}>${s.charAt(0).toUpperCase() + s.slice(1)}</option>`
              ).join('')}
            </select>
          </td>
          <td><span class="lead-date">${new Date(l.created_at).toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' })}</span></td>
          <td>
            <div class="action-btns">
              <button class="action-btn" title="WhatsApp" onclick="openWhatsApp('${l.phone}', '${esc(l.name)}')"><i class="fab fa-whatsapp"></i></button>
              <button class="action-btn" title="Call" onclick="window.open('tel:${l.phone}')"><i class="fas fa-phone"></i></button>
              <button class="action-btn" title="Notes" onclick="openNotes(${l.id}, '${esc(l.notes || '')}')"><i class="fas fa-sticky-note"></i></button>
              <button class="action-btn danger" title="Delete" onclick="deleteLead(${l.id})"><i class="fas fa-trash"></i></button>
            </div>
          </td>
        </tr>
      `).join('');

      const pagDiv = document.getElementById('pagination');
      pagDiv.style.display = data.pages > 1 ? 'flex' : 'none';
      document.getElementById('pageInfo').textContent = `Showing ${data.leads.length} of ${data.total} leads`;
      const pagBtns = document.getElementById('pageBtns');
      pagBtns.innerHTML = '';
      for (let i = 1; i <= data.pages; i++) {
        pagBtns.innerHTML += `<button class="page-btn ${i === data.page ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
    }

    function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function updateStatus(id, status) {
      await apiCall(`/api/admin/leads/${id}`, { method: 'PATCH', body: JSON.stringify({ status }) });
      loadLeads();
    }

    async function deleteLead(id) {
      if (!confirm('Are you sure you want to delete this lead?')) return;
      await apiCall(`/api/admin/leads/${id}`, { method: 'DELETE' });
      loadLeads();
    }

    function openNotes(id, notes) {
      editingLeadId = id;
      document.getElementById('notesText').value = notes;
      document.getElementById('notesModal').classList.add('active');
    }

    function closeNotesModal() {
      document.getElementById('notesModal').classList.remove('active');
      editingLeadId = null;
    }

    async function saveNotes() {
      const notes = document.getElementById('notesText').value;
      await apiCall(`/api/admin/leads/${editingLeadId}`, { method: 'PATCH', body: JSON.stringify({ notes }) });
      closeNotesModal();
      loadLeads();
    }

    function openWhatsApp(phone, name) {
      const cleanPhone = phone.replace(/\D/g, '');
      const num = cleanPhone.startsWith('91') ? cleanPhone : '91' + cleanPhone;
      window.open(`https://wa.me/${num}?text=Hi ${name}, this is from Charanjit Properties. Thank you for your enquiry!`, '_blank');
    }

    function exportCSV() {
      const auth = getAuthHeader();
      if (!auth) return;
      const a = document.createElement('a');
      a.href = '/api/admin/export';
      a.click();
    }

    function goToPage(p) { currentPage = p; loadLeads(); }

    document.querySelectorAll('.filter-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        currentStatus = tab.dataset.status;
        currentPage = 1;
        loadLeads();
      });
    });

    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => {
        currentSearch = e.target.value;
        currentPage = 1;
        loadLeads();
      }, 300);
    });

    loadLeads();
  </script>
</body>
</html>
